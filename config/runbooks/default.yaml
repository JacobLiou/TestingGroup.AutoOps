id: default-runbook
name: Default Production Diagnosis
steps:
  - id: step-system
    name: Check MES/TMS/TAS/FileServer
    checkId: system-dependencies
    nextOnSuccess: step-serial
    nextOnFailure: step-services
  - id: step-serial
    name: Check Serial Hardware Connectivity
    checkId: serial-ports
    nextOnSuccess: step-performance
    nextOnFailure: step-services
  - id: step-performance
    name: TP SDK GRR/GDS/Performance Readonly Checks
    checkId: tp-readonly-performance
    nextOnSuccess: step-services
    nextOnFailure: step-services
  - id: step-services
    name: Validate Required Process Status
    checkId: services-status
    nextOnSuccess: step-baseline
    nextOnFailure: step-baseline
  - id: step-baseline
    name: Validate Baseline Profile Exists
    checkId: baseline-version
